                <div class="layui-col-xs12 layui-col-md4">

                </div>
                <div class="layui-col-xs12 layui-col-md4">

        <script>
            // 定义可变的数据变量
            var panelData = {
                number1: "9,054,056",
                number2: "9,054,056",
                number3: "9,054,056"
            };

            // 更新面板数值的函数
            function updatePanelNumbers() {
                document.getElementById('panel-number-1').textContent = panelData.number1.toLocaleString();
                document.getElementById('panel-number-2').textContent = panelData.number2.toLocaleString();
                document.getElementById('panel-number-3').textContent = panelData.number3.toLocaleString();
            }

            function InitPanelNumbers() {
                $.ajax({
                    type: "post",
                    url: BasePathJLY + '/getnumber',
                    dataType: "json",
                    headers: {'Access-Control-Allow-Origin' : BasePath,},
                    xhrFields: {withCredentials: true},
                    success: function(data){
                        if(data.code==0){
                            panelData.number1 = data.data[0].Param1.toLocaleString() + " / " + data.data[0].Totle.toLocaleString();
                            panelData.number2 = data.data[0].Param2.toLocaleString() + " / " + data.data[0].Totle.toLocaleString();
                            panelData.number3 = data.data[0].Param3.toLocaleString() + " / " + data.data[0].Totle.toLocaleString();
                            updatePanelNumbers();
                            return false;
                        }else if(data.code==1001) {
                            // cookie 失效
                            window.top.location.href = "../../index.html";
                            return false;
                        }else{
                            layer.msg(data.msg,{icon:5,time:5000});
                            return false;
                        }
                    }
                });
            }

            function InitEchartsPies() { 
                // var echartsPies_1 = echarts.init(document.getElementById('echarts-pies-1'), 'walden');

                // InitEchartsPies1(echartsPies_1);

                
                $.ajax({
                    type: "post",
                    url: BasePathJLY + '/getcareinfo',
                    dataType: "json",
                    headers: {'Access-Control-Allow-Origin' : BasePath,},
                    xhrFields: {withCredentials: true},
                    success: function(data){
                        if(data.code==0){
                            initEchartsPies(data.data);
                            return false;
                        }else if(data.code==1001) {
                            // cookie 失效
                            window.top.location.href = "../../index.html";
                            return false;
                        }else{
                            layer.msg(data.msg,{icon:5,time:5000});
                            return false;
                        }
                    }
                });
            }

            function initEchartsPies(data) {
                console.log(data);
                var echartsPies_1 = echarts.init(document.getElementById('echarts-pies-1'), 'walden');
                var echartsPies_2 = echarts.init(document.getElementById('echarts-pies-2'), 'walden');
                var echartsPies_3 = echarts.init(document.getElementById('echarts-pies-3'), 'walden');

                InitEchartsPiesData(echartsPies_1, data[0], '全院 - 自理情况');
                InitEchartsPiesData(echartsPies_2, data[1], '1号楼 - 自理情况');
                InitEchartsPiesData(echartsPies_3, data[2], '2号楼 - 自理情况');

                window.onresize = function () {
                    echartsPies_1.resize();
                    echartsPies_2.resize();
                    echartsPies_3.resize();
                }
            }

            function InitEchartsPiesData(pies, data, title) {
                var optionPies = {
                    title: {
                        text: title,//'全院 - 自理情况',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: '{a} <br/>{b} : {c} ({d}%)'
                    },
                    legend: {
                        orient: 'vertical',
                        left: 'left',
                        data: ['全自理', '半自理', '全护理']
                    },
                    series: [
                        {
                            name: '自理情况',
                            type: 'pie',
                            radius: '55%',
                            center: ['50%', '60%'],
                            roseType: 'radius',
                            data: [
                                {value: data.Value.Param1, name: '全自理'},
                                {value: data.Value.Param2, name: '半自理'},
                                {value: data.Value.Param3, name: '全护理'}
                            ],
                            emphasis: {
                                itemStyle: {
                                    shadowBlur: 10,
                                    shadowOffsetX: 0,
                                    shadowColor: 'rgba(0, 0, 0, 0.5)'
                                }
                            }
                        }
                    ]
                };
                pies.setOption(optionPies);
            }

            layui.extend({
                echarts: 'js/echarts/echarts', // echarts图表扩展
                echartsTheme: 'js/echarts/echartsTheme', // echarts图表主题扩展
            })
            layui.use(['layer', 'echarts'], function () {
                var $ = layui.jquery,
                    layer = layui.layer,
                    echarts = layui.echarts;

                // 初始化面板数值
                InitPanelNumbers();
                InitEchartsPies();
